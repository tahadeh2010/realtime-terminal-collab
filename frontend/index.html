<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Terminal Collaboration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            margin-bottom: 1rem;
            color: #4CAF50;
        }
        p {
            margin-bottom: 1rem;
            color: #888;
        }
        .join-form {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .join-form input {
            padding: 0.75rem;
            margin-right: 0.5rem;
            border: 1px solid #444;
            border-radius: 4px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: monospace;
            width: 300px;
        }
        .join-form button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        .join-form button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Realtime Terminal Collaboration</h1>
        <p>Join an existing session or create a new one</p>
        <div class="join-form">
            <form id="joinForm">
                <input type="text" id="sessionIdInput" placeholder="Enter Session ID" required>
                <button type="submit">Join Session</button>
            </form>
        </div>
    </div>
    <script src="src/app.js"></script>
</body>
</html>
