<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Terminal Collaboration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            margin-bottom: 1rem;
            color: #4CAF50;
        }
        p {
            margin-bottom: 1rem;
            color: #888;
        }
        #status {
            padding: 1rem;
            background: #2a2a2a;
            border-radius: 8px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Realtime Terminal Collaboration</h1>
        <p>Frontend skeleton ready</p>
        <div id="status">Status: Loaded</div>
    </div>
    <script src="src/app.js"></script>
</body>
</html>
