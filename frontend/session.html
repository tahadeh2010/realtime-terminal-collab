<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session - Realtime Terminal Collaboration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 800px;
        }
        h1 {
            margin-bottom: 0.5rem;
            color: #4CAF50;
        }
        .session-id {
            padding: 1rem;
            background: #2a2a2a;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
        }
        .session-id span {
            color: #888;
        }
        #terminal {
            width: 100%;
            max-width: 800px;
            height: 400px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Session</h1>
        <div class="session-id">
            <span>Session ID: </span>
            <span id="sessionId">Loading...</span>
        </div>
    </div>
    <div id="terminal"></div>
    <script src="src/terminal.js"></script>
    <script src="src/session.js"></script>
</body>
</html>
